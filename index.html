<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pro Honda TCR — AR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: Arial, sans-serif; }
    #splash {
      position: fixed; inset: 0; z-index: 100;
      background: radial-gradient(ellipse at center bottom, #1a0000 0%, #050505 70%);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
      transition: opacity 0.5s;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash img { width: 200px; animation: glow 2s ease-in-out infinite; }
    @keyframes glow {
      0%,100% { filter: drop-shadow(0 0 8px rgba(224,0,0,0.4)); }
      50%      { filter: drop-shadow(0 0 28px rgba(224,0,0,1)); }
    }
    .sp-eye   { font-size: 9px; letter-spacing: 6px; color: #E00000; text-transform: uppercase; }
    .sp-title { font-size: 24px; font-weight: 900; color: #fff; text-align: center; line-height: 1.2; }
    .sp-title em { color: #E00000; font-style: normal; display: block; }
    .sp-line  { width: 60px; height: 2px; background: repeating-linear-gradient(90deg,#E00000 0,#E00000 5px,transparent 5px,transparent 10px); }
    .sp-sub   { font-size: 9px; color: #444; letter-spacing: 3px; text-transform: uppercase; }
    #btn {
      background: #E00000; color: #fff; border: none;
      padding: 16px 48px; font-size: 12px; font-weight: 800;
      letter-spacing: 4px; text-transform: uppercase;
      border-radius: 2px; cursor: pointer;
      box-shadow: 0 0 24px rgba(224,0,0,0.5);
    }
    .sp-tip { font-size: 9px; color: #2a2a2a; letter-spacing: 2px; text-transform: uppercase; }
    #ar-scene { display: none; position: fixed; inset: 0; width: 100%; height: 100%; }
    #ar-scene.active { display: block; }
    #cta {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: linear-gradient(0deg, rgba(0,0,0,0.92) 70%, transparent);
      padding: 20px 24px 36px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      opacity: 0; pointer-events: none; transition: opacity 0.6s;
    }
    #cta.show { opacity: 1; pointer-events: all; }
    #cta img { width: 90px; filter: drop-shadow(0 0 8px rgba(224,0,0,0.4)); }
    #cta .tag { font-size: 13px; font-weight: 900; color: #fff; letter-spacing: 2px; text-transform: uppercase; text-align: center; }
    #cta .tag em { color: #E00000; font-style: normal; }
    #cta .btns { display: flex; gap: 10px; }
    #cta .bp { background: #E00000; color: #fff; border: none; padding: 13px 28px; font-size: 11px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; border-radius: 2px; text-decoration: none; }
    #cta .bs { background: rgba(255,255,255,0.08); color: #888; border: 1px solid #333; padding: 13px 18px; font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; border-radius: 2px; text-decoration: none; }
  </style>
</head>
<body>

<!-- Vídeos fora da cena — iOS precisa deles no DOM para autoplay -->
<video id="vid-webm" src="prohonda_video.webm"
  playsinline webkit-playsinline loop crossorigin="anonymous"
  style="display:none"></video>
<video id="vid-mp4" src="prohonda_video.mp4"
  playsinline webkit-playsinline muted loop crossorigin="anonymous"
  style="display:none"></video>

<div id="splash">
  <div class="sp-eye">Realidade Aumentada</div>
  <img src="logo.png" alt="Pro Honda">
  <div class="sp-title">Da Pista<em>Para Sua Garagem</em></div>
  <div class="sp-line"></div>
  <div class="sp-sub">TCR South America · +600 Vitorias</div>
  <button id="btn" onclick="startAR()">ATIVAR CAMERA</button>
  <div class="sp-tip">Aponte para o material Pro Honda</div>
</div>

<a-scene id="ar-scene"
  mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no; filterMinCF: 0.0001; filterBeta: 0.001"
  color-space="sRGB"
  renderer="colorManagement: true; alpha: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-assets>
    <video id="vid-webm-asset" src="prohonda_video.webm"
      playsinline webkit-playsinline loop crossorigin="anonymous"></video>
    <video id="vid-mp4-asset" src="prohonda_video.mp4"
      playsinline webkit-playsinline muted loop crossorigin="anonymous"></video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">
    <a-plane id="plane-webm"
      position="0 1.6 0.01"
      scale="1.32 2.28 1"
      material="shader: flat; src: #vid-webm-asset; transparent: true; alphaTest: 0.05; side: front;"
      visible="false">
    </a-plane>
    <a-plane id="plane-mp4"
      position="0 1.6 0.01"
      scale="1.32 2.28 1"
      material="shader: flat; src: #vid-mp4-asset; transparent: true; alphaTest: 0.15; side: front;"
      visible="false">
    </a-plane>
  </a-entity>
</a-scene>

<div id="cta">
  <img src="logo.png" alt="Pro Honda">
  <div class="tag">Da Pista <em>Para Sua Garagem</em></div>
  <div class="btns">
    <a class="bp" href="https://wa.me/5511999999999?text=Quero+saber+mais+sobre+Pro+Honda" target="_blank">SAIBA MAIS</a>
    <a class="bs" href="https://wa.me/?text=Experiencia+AR+Pro+Honda+TCR!" target="_blank">COMPARTILHAR</a>
  </div>
</div>

<script>
function isIOS() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
}

var ios = isIOS();
var activeVid, activePlane;

function startAR() {
  // iOS: toca o vídeo DENTRO do evento de toque (obrigatório para autoplay)
  activeVid   = document.getElementById(ios ? 'vid-mp4-asset' : 'vid-webm-asset');
  activePlane = document.getElementById(ios ? 'plane-mp4'     : 'plane-webm');

  // Força play no contexto do toque — iOS exige isso
  activeVid.muted = ios ? true : false;
  activeVid.play().catch(function(){});
  activeVid.pause();

  var scene = document.getElementById('ar-scene');
  scene.classList.add('active');
  document.getElementById('splash').classList.add('hidden');

  scene.addEventListener('loaded', function() {
    var sys = scene.systems['mindar-image-system'];
    if (sys) sys.start();
  }, { once: true });

  setTimeout(function() {
    var sys = scene.systems['mindar-image-system'];
    if (sys && !sys.started) sys.start();
  }, 2000);

  var tgt = document.querySelector('[mindar-image-target]');
  tgt.addEventListener('targetFound', function() {
    activePlane.setAttribute('visible', true);
    activeVid.play().catch(function(){});
    setTimeout(function() {
      document.getElementById('cta').classList.add('show');
    }, 4000);
  });
  tgt.addEventListener('targetLost', function() {
    activePlane.setAttribute('visible', false);
    activeVid.pause();
    document.getElementById('cta').classList.remove('show');
  });
}
</script>

</body>
</html>
